name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Verify release versions
        run: |
          tag="${GITHUB_REF_NAME}"
          expected="${tag#v}"
          cli_go_version="$(node -p "require('./packages/cli/package.json').rstf.goVersion")"
          cli_version="$(node -p "require('./packages/cli/package.json').version")"
          create_version="$(node -p "require('./packages/create-rstf/package.json').version")"
          go_cli_version="$(go run ./cmd/rstf version)"

          echo "tag=${tag}"
          echo "cli.rstf.goVersion=${cli_go_version}"
          echo "cli.version=${cli_version}"
          echo "create-rstf.version=${create_version}"
          echo "go-cli.version=${go_cli_version}"

          [ "${tag}" = "${cli_go_version}" ] || { echo "release check failed: tag ${tag} does not match packages/cli rstf.goVersion ${cli_go_version}"; exit 1; }
          [ "${expected}" = "${go_cli_version}" ] || { echo "release check failed: tag version ${expected} does not match go CLI version ${go_cli_version}"; exit 1; }
          [ "${expected}" = "${cli_version}" ] || { echo "release check failed: tag version ${expected} does not match packages/cli version ${cli_version}"; exit 1; }
          [ "${expected}" = "${create_version}" ] || { echo "release check failed: tag version ${expected} does not match create-rstf version ${create_version}"; exit 1; }
      - name: Test CLI installer
        run: node --test packages/cli/scripts/install.test.js
      - name: Check npm package manifests
        run: |
          (cd packages/cli && npm pack --dry-run)
          (cd packages/create-rstf && npm pack --dry-run)
      - name: Test
        run: go test ./...

  build-cli:
    needs: verify
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o "dist/rstf-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/rstf
      - uses: actions/upload-artifact@v4
        with:
          name: rstf-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/rstf-${{ matrix.goos }}-${{ matrix.goarch }}

  publish-release-assets:
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rstf-*
          path: dist
          merge-multiple: true
      - name: Generate release checksums
        run: |
          find dist -maxdepth 1 -type f -name 'rstf-*' -print0 | sort -z | xargs -0 sha256sum > dist/rstf-checksums.txt
      - uses: sigstore/cosign-installer@v3
      - name: Sign release checksums
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/rstf-checksums.txt.sig \
            --output-certificate dist/rstf-checksums.txt.pem \
            dist/rstf-checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rstf-darwin-*
            dist/rstf-linux-*
            dist/rstf-checksums.txt
            dist/rstf-checksums.txt.sig
            dist/rstf-checksums.txt.pem

  publish-npm:
    needs:
      - verify
      - publish-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Select npm dist-tag
        id: npm_tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "${version}" == *-* ]]; then
            echo "value=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish @rstf/cli
        working-directory: packages/cli
        run: npm publish --access public --tag "${{ steps.npm_tag.outputs.value }}"
      - name: Publish create-rstf
        working-directory: packages/create-rstf
        run: npm publish --access public --tag "${{ steps.npm_tag.outputs.value }}"
